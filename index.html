<!DOCTYPE html>
<html>
<head>
<title>Nahmir Store</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family: Arial;
background:#0f172a;
color:white;
margin:0;
}

header{
background:#020617;
padding:20px;
text-align:center;
font-size:28px;
font-weight:bold;
}

.container{
display:flex;
flex-wrap:wrap;
justify-content:center;
padding:20px;
}

.card{
background:#1e293b;
width:260px;
margin:15px;
padding:20px;
border-radius:12px;
text-align:center;
transition:0.3s;
}

.card:hover{
transform:scale(1.05);
}

.price{
color:#22c55e;
font-size:20px;
margin:10px 0;
}

button{
background:#22c55e;
border:none;
padding:10px 18px;
border-radius:6px;
color:white;
cursor:pointer;
}

button:hover{
background:#16a34a;
}

.payment{
text-align:center;
padding:30px;
background:#020617;
}

footer{
text-align:center;
padding:15px;
background:#020617;
}

</style>
</head>

<body>

<header>
🔥 Nahmir Store
</header>

<div class="container">

<div class="card">
<h3>Spotify Lifetime</h3>
<p class="price">₹800</p>
<p>1 Year Warranty</p>
<button onclick="window.location.href='https://t.me/nahmirstore'">Order</button>
</div>

<div class="card">
<h3>Gemini AI Pro</h3>
<p class="price">₹399</p>
<p>12 Months Access</p>
<button onclick="window.location.href='https://t.me/nahmirstore'">Order</button>
</div>

<div class="card">
<h3>Amazon Prime</h3>
<p class="price">₹130</p>
<p>Full Prime Benefits</p>
<button onclick="window.location.href='https://t.me/nahmirstore'">Order</button>
</div>

<div class="card">
<h3>Microsoft 365</h3>
<p class="price">₹299</p>
<p>1 Year Subscription</p>
<button onclick="window.location.href='https://t.me/nahmirstore'">Order</button>
</div>

</div>

<div class="payment">
<h2>Payment Methods</h2>
<p>UPI • Crypto • Bank Transfer</p>
<p>Instant Activation within 15 Minutes</p>
</div>

<footer>
Support: Telegram @nahmirstore
</footer>

</body>
</html>
